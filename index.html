<!-- RSVP SECTION -->
<section id="rsvp" class="py-32 px-6 flex flex-col items-center justify-center bg-[#F5EBE0]">
    <div id="rsvp-card" class="max-w-xl w-full glass-card p-12 rounded-[40px] text-center" data-aos="zoom-in">
        
        <!-- INITIAL FORM (Name Only) -->
        <div id="rsvp-form-area">
            <h2 class="text-4xl mb-4 font-serif">RSVP</h2>
            <p class="text-[10px] uppercase tracking-widest mb-10 font-bold opacity-80">Kindly confirm your attendance by 15 May 2026</p>
            
            <form action="https://formspree.io/f/mjgpnrvn" method="POST" id="weddingForm" class="space-y-6 text-left">
                <input type="text" name="Main_Name" placeholder="Your Full Name" class="w-full p-5 rounded-2xl bg-white/60 border-none ring-1 ring-black/5 focus:ring-2 focus:ring-[#AF8F6F] outline-none" required>
                <div id="plusOnes" class="space-y-4"></div>
                <button type="button" onclick="addGuest()" class="w-full py-4 border-2 border-dashed border-gray-300 rounded-2xl text-[10px] font-bold text-gray-500 hover:bg-white/50 uppercase tracking-widest">+ Add Guest (Up to 9)</button>
                <button type="submit" id="submitBtn" class="w-full py-6 premium-btn rounded-2xl font-bold shadow-2xl uppercase tracking-[0.2em] text-xs">Confirm Attendance</button>
            </form>
        </div>

        <!-- SUCCESS SCREEN (Email & Calendar Option) -->
        <div id="success-area" class="hidden animate-fade-in">
            <div class="text-5xl mb-6">🥂</div>
            <h2 class="text-3xl mb-4 font-serif">You're on the list!</h2>
            <p class="mb-8 italic opacity-70">We can't wait to see you in Mutare.</p>
            
            <div class="bg-white/40 p-6 rounded-3xl border border-white/60">
                <p class="text-[10px] uppercase font-bold tracking-widest mb-4">Add to your Calendar</p>
                
                <!-- Direct One-Click Links (Best for Mobile) -->
                <div class="grid grid-cols-1 gap-3">
                    <a href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=Tapiwa+%26+Tatenda%27s+Wedding&dates=20261226T140000Z/20261227T020000Z&details=Celebrate+with+us!&location=Mutare,+Zimbabwe" target="_blank" class="py-3 bg-white rounded-xl text-[10px] font-bold shadow-sm hover:shadow-md transition-all">GOOGLE CALENDAR</a>
                    
                    <a href="https://outlook.live.com/calendar/0/deeplink/compose?path=/calendar/action/compose&rru=addevent&subject=Tapiwa+%26+Tatenda%27s+Wedding&startdt=2026-12-26T14:00:00&enddt=2026-12-27T02:00:00&body=Wedding+Day!&location=Mutare,+Zimbabwe" target="_blank" class="py-3 bg-white rounded-xl text-[10px] font-bold shadow-sm hover:shadow-md transition-all">OUTLOOK / APPLE</a>
                </div>

                <div class="mt-8 pt-6 border-t border-white/50">
                    <p class="text-[10px] opacity-60 mb-4 italic">Or enter your email for an invite update:</p>
                    <form action="https://formspree.io/f/mjgpnrvn" method="POST" class="flex gap-2">
                        <input type="email" name="Mailing_List_Email" placeholder="Email" class="flex-1 p-3 rounded-xl bg-white/60 text-xs border-none outline-none ring-1 ring-black/5">
                        <button type="submit" class="px-4 py-3 bg-[#AF8F6F] text-white rounded-xl text-[10px] font-bold">SEND</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
    // FORM SUBMISSION LOGIC
    const rsvpForm = document.getElementById('weddingForm');
    rsvpForm.onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerText = "SENDING...";
        btn.disabled = true;

        const response = await fetch(rsvpForm.action, {
            method: 'POST',
            body: new FormData(rsvpForm),
            headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
            document.getElementById('rsvp-form-area').classList.add('hidden');
            document.getElementById('success-area').classList.remove('hidden');
        } else {
            alert("Problem sending RSVP. Please try again!");
            btn.innerText = "CONFIRM ATTENDANCE";
            btn.disabled = false;
        }
    };

    // KEEP YOUR EXISTING addGuest() and admin() functions below...
</script>
